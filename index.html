  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --card-2: #f1f1ef;
      --text: #202123;
      --muted: #6b6f76;
      --muted-2: #8a8f98;
      --line: #e2e2df;
      --line-2: #d5d5d1;
      --ink: #2f3136;
      --shadow: 0 12px 34px rgba(0, 0, 0, 0.06);
      --radius-xl: 28px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #ffffff 0, var(--bg) 48%, #efefec 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", "Segoe UI", sans-serif;
      letter-spacing: -0.02em;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 52px;
    }

    header { margin-bottom: 18px; }
    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .mark, .auth-mark {
      display: grid;
      place-items: center;
      overflow: visible;
      flex: 0 0 auto;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    .mark {
      width: 51px;
      height: 40px;
    }

    .auth-mark {
      width: 82px;
      height: 65px;
      margin: 0 auto 14px;
    }

    .mark img, .auth-mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand .mark {
      position: relative;
      top: -4px;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 36px);
      line-height: 1.12;
      font-weight: 780;
      letter-spacing: -0.04em;
    }

    .auth-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 18px;
    }

    .auth-card {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.86);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .auth-card h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.16;
    }

    .auth-card p {
      margin: 10px 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .auth-form { display: grid; gap: 10px; }
    .auth-form label { color: var(--muted); font-size: 13px; font-weight: 650; }

    .password-row { display: flex; gap: 8px; }

    .password-row input {
      min-width: 0;
      flex: 1;
      height: 46px;
      border: 1px solid var(--line-2);
      border-radius: 14px;
      padding: 0 13px;
      font: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .password-row input:focus {
      border-color: #8f8f89;
      box-shadow: 0 0 0 4px rgba(32,33,35,0.07);
    }

    .auth-error {
      min-height: 18px;
      color: #6b2e2e;
      font-size: 12.5px;
      line-height: 1.45;
    }

    .auth-footnote {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted-2);
      font-size: 12px;
      line-height: 1.5;
    }

    .solid-btn, .delete-chip {
      appearance: none;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      transition: 0.16s ease;
    }

    .solid-btn {
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #fff;
      padding: 10px 15px;
      font-size: 14px;
      font-weight: 700;
    }

    .delete-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      background: var(--card-2);
      color: var(--muted);
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .solid-btn:hover, .delete-chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.10);
    }

    .delete-chip:hover {
      background: #e9e9e6;
      color: var(--text);
    }

    .upload-shell { margin: 18px 0 20px; }

    .dropzone {
      min-height: 156px;
      border: 1.5px dashed var(--line-2);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.78);
      box-shadow: var(--shadow);
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: 0.18s ease;
      cursor: pointer;
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: #8f8f89;
      background: #fff;
      transform: translateY(-1px);
    }

    .drop-inner strong {
      display: block;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .drop-inner span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 16px;
    }

    input[type="file"] { display: none; }

    .dashboard { display: none; }
    .dashboard.show { display: block; }

    .month-list {
      display: grid;
      gap: 16px;
    }

    .month-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.86);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .month-card summary {
      list-style: none;
      cursor: pointer;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      user-select: none;
    }

    .month-card summary::-webkit-details-marker { display: none; }

    .month-title-wrap {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .month-toggle {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: var(--card-2);
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #4f5359;
      flex: 0 0 36px;
      padding: 0;
      line-height: 1;
      box-sizing: border-box;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .month-toggle svg {
      width: 20px;
      height: 20px;
      display: block;
      stroke: currentColor;
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: transform 0.18s ease;
    }

    .month-card[open] .month-toggle {
      background: #e9e9e6;
      color: var(--text);
      border-color: #d8d8d4;
    }

    .month-card[open] .month-toggle svg {
      transform: rotate(0deg);
    }

    .month-title {
      margin: 0;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: -0.04em;
      line-height: 1.18;
      font-weight: 820;
      word-break: keep-all;
    }

    .month-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .month-body {
      padding: 0 24px 24px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .metric {
      background: rgba(255,255,255,0.84);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 22px rgba(0,0,0,0.035);
      padding: 20px;
      min-height: 128px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .metric .value {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 820;
      letter-spacing: -0.045em;
      line-height: 1.04;
    }

    .metric .note {
      margin-top: 11px;
      color: var(--muted-2);
      font-size: 12.5px;
      line-height: 1.4;
    }

    .section-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .panel {
      background: rgba(255,255,255,0.84);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: 0 8px 22px rgba(0,0,0,0.035);
      padding: 22px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .panel h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .panel .hint {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .spend-chart {
      display: grid;
      gap: 12px;
    }

    .spend-row {
      display: grid;
      grid-template-columns: minmax(82px, 120px) minmax(0, 1fr) minmax(102px, auto);
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fbfbfa;
    }

    .spend-label {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      font-weight: 800;
      letter-spacing: -0.035em;
      word-break: keep-all;
      line-height: 1.2;
    }

    .spend-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(32,33,35,0.08);
    }

    .spend-bar-track {
      position: relative;
      height: 36px;
      border-radius: 999px;
      background: #eeeeeb;
      overflow: hidden;
      border: 1px solid #e4e4df;
    }

    .spend-bar-fill {
      height: 100%;
      border-radius: inherit;
      min-width: 7px;
      transition: width 0.35s ease;
    }

    .spend-percent {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #202123;
      font-size: 14px;
      font-weight: 850;
      letter-spacing: -0.03em;
      paint-order: stroke;
    }

    .spend-info {
      display: grid;
      gap: 3px;
      text-align: right;
      white-space: nowrap;
    }

    .spend-amount {
      font-size: 15px;
      font-weight: 830;
      letter-spacing: -0.035em;
    }

    .spend-count {
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 700;
    }

    .legend-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .legend-item {
      display: grid;
      gap: 8px;
      padding: 14px;
      background: #fbfbfa;
      border: 1px solid var(--line);
      border-radius: 18px;
      min-width: 0;
    }

    .legend-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .legend-name-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(32,33,35,0.08);
      flex: 0 0 auto;
    }

    .legend-name {
      font-weight: 760;
      letter-spacing: -0.03em;
      word-break: keep-all;
      line-height: 1.25;
    }

    .legend-amount {
      font-weight: 760;
      white-space: nowrap;
      text-align: right;
    }

    .category-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
      word-break: keep-all;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--card-2);
      border: 1px solid var(--line);
      color: var(--muted);
      white-space: nowrap;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 420px;
      background: #fff;
    }

    thead th {
      text-align: left;
      background: #f4f4f2;
      color: var(--muted);
      font-size: 12px;
      padding: 12px 12px;
      border-bottom: 1px solid var(--line);
      font-weight: 760;
      white-space: nowrap;
    }

    tbody td {
      padding: 13px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13.5px;
      vertical-align: top;
    }

    tbody tr:last-child td { border-bottom: 0; }
    .num { text-align: right; white-space: nowrap; }
    .rank { color: var(--muted); width: 52px; }

    .top-mobile-meta {
      display: none;
    }

    .empty-state {
      margin-top: 18px;
      padding: 36px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.6);
    }

    .empty-state strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-bottom: 6px;
    }

    .error {
      display: none;
      background: #fff;
      border: 1px solid #d8d8d4;
      border-left: 4px solid #202123;
      border-radius: 16px;
      padding: 14px 15px;
      margin-bottom: 16px;
      color: var(--text);
      line-height: 1.5;
      box-shadow: var(--shadow);
    }

    .error.show { display: block; }

    footer {
      margin-top: 26px;
      color: var(--muted-2);
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }

    @media (max-width: 920px) {
      .app { width: min(100% - 22px, 720px); padding-top: 22px; }
      .metric-grid { grid-template-columns: 1fr; }
      .dropzone { min-height: 148px; padding: 22px 18px; }
      .metric { min-height: auto; padding: 18px; }
      .panel { padding: 18px; }
      .spend-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .spend-info {
        text-align: left;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
    }

    @media (max-width: 520px) {
      .app { width: calc(100% - 18px); }
      .auth-card { padding: 24px 20px; }
      .password-row { display: grid; }
      .password-row .solid-btn { width: 100%; }
      .brand { align-items: center; gap: 10px; }
      .mark { width: 47px; height: 37px; }
      .brand .mark { top: -3px; }
      .drop-inner strong { font-size: 18px; }
      .month-card summary { padding: 22px 20px; }
      .month-body { padding: 0 20px 20px; }
      .month-title { font-size: 22px; line-height: 1.2; }
      .month-toggle { width: 34px; height: 34px; flex-basis: 34px; }
      .month-toggle svg { width: 19px; height: 19px; }
      .delete-chip { padding: 7px 11px; font-size: 12.5px; }
      .spend-row { padding: 13px; border-radius: 17px; }
      .spend-bar-track { height: 38px; }
      .spend-percent { font-size: 14.5px; }
      .spend-label { font-size: 15.5px; }
      .spend-amount { font-size: 15px; }
      .legend-list { grid-template-columns: 1fr; }
    }

    .donut-section {
      display: grid;
      gap: 18px;
    }

    .donut-layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 24px;
      align-items: center;
    }

    .donut-visual {
      width: min(100%, 380px);
      aspect-ratio: 1 / 1;
      position: relative;
      margin: 0 auto;
    }

    .donut-visual svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .donut-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 50%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: rgba(255,255,255,0.98);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 13px;
      box-shadow: inset 0 0 0 1px rgba(32,33,35,0.05), 0 10px 26px rgba(0,0,0,0.05);
      pointer-events: none;
    }

    .donut-center strong {
      display: block;
      color: var(--muted);
      font-size: 14px;
      font-weight: 760;
      margin-bottom: 6px;
    }

    .donut-center span {
      display: block;
      color: var(--text);
      font-size: clamp(20px, 2.6vw, 27px);
      font-weight: 880;
      line-height: 1.08;
      letter-spacing: -0.055em;
    }

    .category-side-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      align-content: center;
      min-width: 0;
    }

    .category-side-card {
      display: grid;
      gap: 10px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fbfbfa;
      min-width: 0;
    }

    .category-side-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .category-side-name {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      font-size: 17px;
      font-weight: 850;
      line-height: 1.18;
      letter-spacing: -0.045em;
      word-break: keep-all;
    }

    .category-side-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(32,33,35,0.08);
    }

    .category-side-amount {
      font-size: 16px;
      font-weight: 850;
      line-height: 1.15;
      letter-spacing: -0.04em;
      text-align: right;
      white-space: nowrap;
    }

    .category-side-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .category-side-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--card-2);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
      line-height: 1;
      white-space: nowrap;
    }

    .category-side-includes {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
      word-break: keep-all;
    }

    .donut-caption {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
      margin: 0;
    }

    .donut-slice {
      transition: transform 0.16s ease, opacity 0.16s ease;
      transform-origin: center;

<body>
  <section class="auth-screen" id="authScreen" aria-label="비밀번호 입력 화면">

    <header class="app-header">

          <img src="pig-logo-square.png" alt="" />
        </button>
        <h1>꿀꿀 부부 가계부</h1>

    <div class="error" id="errorBox" role="alert"></div>

    <section class="dashboard show" id="dashboard" aria-label="가계부 화면">
      <section class="page-view" id="homeView" data-view="home">

      <strong>아직 불러온 가계부가 없어요</strong>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2cOrz60-e_wfpSdakhnWG6pkcVyjb3YI",
      authDomain: "minj0475-ggulggul-budget.firebaseapp.com",
      projectId: "minj0475-ggulggul-budget",
      storageBucket: "minj0475-ggulggul-budget.firebasestorage.app",
      messagingSenderId: "822578452335",
      appId: "1:822578452335:web:278b0c19907a123c383a9a"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    const STORAGE_KEY = 'householdSummary:monthlySummaries';
    const MIGRATION_KEY = 'householdSummary:cloudMigrated';
    const LAST_EMAIL_KEY = 'householdSummary:lastEmail';
    const COLLECTION_NAME = 'householdSummaries';
    const CHART_COLORS = ['#2E3642', '#7FA271', '#6F92D7', '#AC97D2', '#CAA654', '#C47B63', '#5C98A5', '#C487A4', '#8F9FB6', '#B7A06A'];
    const CATEGORY_COLORS = {
      '고정비': '#2E3642',
      '뷰티/쇼핑': '#C487A4',
      '식비': '#6F92D7',
      '의료비': '#AC97D2',
      '문화/여가': '#CAA654',
      '생활비': '#7FA271',
      '교통/차량': '#5C98A5',
      '여행/숙박': '#C47B63',
      '주거': '#8F9FB6',
      '기타': '#B7A06A'
    };

    const authScreen = document.getElementById('authScreen');
    const appShell = document.getElementById('appShell');
    const authForm = document.getElementById('authForm');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const authError = document.getElementById('authError');
    const menuButton = document.getElementById('menuButton');
    const sideLogoButton = document.getElementById('sideLogoButton');
    const menuBackdrop = document.getElementById('menuBackdrop');
    const sideMenu = document.getElementById('sideMenu');
    const sideNav = document.getElementById('sideNav');
    const uploadShell = document.getElementById('uploadShell');
    const mobileNote = document.getElementById('mobileNote');
    const syncStatus = document.getElementById('syncStatus');
    const logoutButton = document.getElementById('logoutButton');
    const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const pickButton = document.getElementById('pickButton');
    const errorBox = document.getElementById('errorBox');
    const dashboard = document.getElementById('dashboard');
    const emptyState = document.getElementById('emptyState');
    const homeView = document.getElementById('homeView');
    const ledgerView = document.getElementById('ledgerView');
    const analysisView = document.getElementById('analysisView');
    const homeHead = document.getElementById('homeHead');
    const homeContent = document.getElementById('homeContent');
    const ledgerContent = document.getElementById('ledgerContent');
    const analysisContent = document.getElementById('analysisContent');

    let currentUser = null;
    let currentItems = [];
    let activeView = 'home';
    let selectedMonthKey = '';
    let analysisTargetKey = '';
    let analysisCompareKey = '';
    let menuTouchStartX = 0;
    let menuTouchStartY = 0;

    function setSyncStatus(message = '') {
      syncStatus.textContent = message;
    }

    function isMobileView() {
      return window.matchMedia('(max-width: 760px)').matches;
    }

    function updateMobileMode() {
      const mobile = isMobileView();
      if (uploadShell) uploadShell.hidden = mobile || activeView !== 'home';
      if (mobileNote) mobileNote.hidden = true;
    }

    function toPlainData(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function cleanText(value) {
      if (value === null || value === undefined) return '';
      return String(value).trim();
    }

    function formatMoney(value) {
      const n = Number(value || 0);
      return `${n.toLocaleString('ko-KR')}원`;
    }

    function formatPercent(value) {
      const n = Number(value || 0);
      if (!Number.isFinite(n)) return '-';
      return `${(n * 100).toFixed(1)}%`;
    }

    function escapeHtml(value) {
      return cleanText(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('show');
    }

    function hideError() {
      errorBox.classList.remove('show');
      errorBox.textContent = '';
    }

    function showApp() {
      authScreen.hidden = true;
      appShell.hidden = false;
      updateMobileMode();
      loadSavedSummaries();
    }

    function showLogin() {
      authScreen.hidden = false;
      appShell.hidden = true;
      authError.textContent = '';
      const savedEmail = localStorage.getItem(LAST_EMAIL_KEY) || '';
      if (savedEmail && !emailInput.value) emailInput.value = savedEmail;
      setTimeout(() => (emailInput.value ? passwordInput : emailInput).focus(), 50);
    }

    async function checkPassword() {
      authError.textContent = '';
      const email = cleanText(emailInput.value);
      const password = passwordInput.value || '';
      if (!email) {
        authError.textContent = '이메일을 입력해줘요.';
        emailInput.focus();
        return;
      }
      if (!password) {
        authError.textContent = '비밀번호를 입력해줘요.';
        passwordInput.focus();
        return;
      }

      const submitButton = authForm.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = '확인 중';
      try {
        await signInWithEmailAndPassword(auth, email, password);
        localStorage.setItem(LAST_EMAIL_KEY, email);
        passwordInput.value = '';
      } catch (error) {
        console.error(error);
        authError.textContent = '이메일 또는 비밀번호가 맞지 않아요.';
        passwordInput.select();
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = '열기';
      }
    }

    function getStore() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed;
        if (parsed && Array.isArray(parsed.items)) return parsed.items;
        return [];
      } catch (_) {
        return [];
      }
    }

    function saveStore(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    async function fetchCloudSummaries() {
      const snapshot = await getDocs(collection(db, COLLECTION_NAME));
      const items = [];
      snapshot.forEach((docSnap) => {
        items.push({ ...docSnap.data(), periodId: docSnap.id });
      });
      return items;
    }

    async function migrateLocalSummariesToCloud(cloudItems) {
      if (localStorage.getItem(MIGRATION_KEY) === '1') return false;
      const localItems = getStore();
      if (!localItems.length) {
        localStorage.setItem(MIGRATION_KEY, '1');
        return false;
      }

      const cloudKeys = new Set(cloudItems.map((item) => monthKey(item)));
      let migratedCount = 0;
      for (const item of localItems) {
        const id = monthKey(item);
        if (!id || cloudKeys.has(id)) continue;
        const plain = toPlainData({
          ...item,
          periodId: id,
          migratedAt: new Date().toISOString(),
          updatedAt: item.updatedAt || item.parsedAt || new Date().toISOString()
        });
        await setDoc(doc(db, COLLECTION_NAME, id), plain);
        migratedCount += 1;
      }
      localStorage.setItem(MIGRATION_KEY, '1');
      return migratedCount > 0;
    }

    async function loadSavedSummaries() {
      if (!currentUser) return;
      hideError();
      setSyncStatus('');
      try {
        let cloudItems = await fetchCloudSummaries();
        const migrated = await migrateLocalSummariesToCloud(cloudItems);
        if (migrated) cloudItems = await fetchCloudSummaries();
        currentItems = cloudItems;
        saveStore(currentItems);
        renderAllSummaries(currentItems);
        setSyncStatus('');
      } catch (error) {
        console.error(error);
        currentItems = getStore();
        renderAllSummaries(currentItems);
        setSyncStatus('');
        showError('저장소 연결을 확인하지 못했어요. 로그인 상태와 Firestore 규칙을 확인해줘요.');
      }
    }

    function findRow(rows, predicate) {
      return rows.findIndex((row) => predicate(cleanText(row?.[0] ?? '')));
    }

    function parseSummaryRows(rows) {
      if (!rows.length) throw new Error('한눈요약 탭에 읽을 수 있는 내용이 없어요.');

      const title = cleanText(rows[0]?.[0]) || '가계부 한눈요약';
      const metrics = [];
      ['총수입', '총지출', '순증감'].forEach((label) => {
        const idx = findRow(rows, (cell) => cell === label);
        if (idx >= 0) {
          metrics.push({ label, value: rows[idx][1], note: cleanText(rows[idx][2]) });
        }
      });

      const categoryHeader = findRow(rows, (cell) => cell === '분류');
      if (categoryHeader < 0) throw new Error('한눈요약 탭에서 분류 표를 찾지 못했어요.');

      const categories = [];
      for (let i = categoryHeader + 1; i < rows.length; i++) {
        const name = cleanText(rows[i]?.[0]);
        if (!name) continue;
        if (name === '합계') break;
        categories.push({
          name,
          amount: Number(rows[i][1] || 0),
          ratio: Number(rows[i][2] || 0),
          count: Number(rows[i][3] || 0),
          includes: cleanText(rows[i][4])
        });
      }

      const topHeader = findRow(rows, (cell) => cell.includes('많이 쓴 항목'));
      const top = [];
      if (topHeader >= 0) {
        for (let i = topHeader + 1; i < rows.length; i++) {
          const item = cleanText(rows[i]?.[0]);
          if (!item) continue;
          top.push({
            item,
            category: cleanText(rows[i][1]),
            count: Number(rows[i][2] || 0),
            amount: Number(rows[i][3] || 0)
          });
        }
      }

      return { title, metrics, categories, top, parsedAt: new Date().toISOString() };
    }

    function parseWorkbook(arrayBuffer) {
      if (!window.XLSX) {
        throw new Error('엑셀 읽기 라이브러리를 불러오지 못했어요. 인터넷 연결 후 다시 열어주세요.');
      }
      const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
      const sheetName = workbook.SheetNames.find((name) => name.trim() === '한눈요약');
      if (!sheetName) {
        throw new Error('시트 이름이 “한눈요약”인 탭을 찾지 못했어요. 최종 가계부 양식 파일인지 확인해줘요.');
      }
      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {
        header: 1, raw: true, defval: null, blankrows: false
      });
      return parseSummaryRows(rows);
    }

    function extractPeriod(title) {
      const match = cleanText(title).match(/(\d{4}년\s*\d{1,2}월|\d{1,2}월)/);
      return match ? match[1].replace(/\s+/g, ' ') : '';
    }

    function periodIdFromTitle(title) {
      const text = cleanText(title);
      const full = text.match(/(\d{4})\s*년\s*(\d{1,2})\s*월/);
      if (full) return `${full[1]}-${String(Number(full[2])).padStart(2, '0')}`;
      const monthOnly = text.match(/(\d{1,2})\s*월/);
      if (monthOnly) return `${new Date().getFullYear()}-${String(Number(monthOnly[1])).padStart(2, '0')}`;
      return '';
    }

    function periodLabelFromId(id) {
      const match = cleanText(id).match(/^(\d{4})-(\d{2})$/);
      if (!match) return '';
      return `${match[1]}년 ${Number(match[2])}월`;
    }

    function formatSummaryTitle(title) {
      const text = cleanText(title);
      if (!text) return '가계부';
      return text
        .replace(/\s*한눈요약\s*$/g, '')
        .replace(/가계부\s*$/g, '가계부')
        .trim();
    }

    function monthKey(data) {
      if (data?.periodId) return cleanText(data.periodId);
      return periodIdFromTitle(data?.title) || extractPeriod(data?.title) || formatSummaryTitle(data?.title) || `summary-${Date.now()}`;
    }

    function sortablePeriodValue(item) {
      const id = cleanText(item?.periodId);
      const idMatch = id.match(/^(\d{4})-(\d{2})$/);
      if (idMatch) return Number(idMatch[1]) * 100 + Number(idMatch[2]);
      const period = extractPeriod(item?.title);
      const y = Number((period.match(/(\d{4})년/) || [0, 0])[1]);
      const m = Number((period.match(/(\d{1,2})월/) || [0, 0])[1]);
      return y * 100 + m;
    }

    function sortSummaries(items) {
      return [...items].sort((a, b) => sortablePeriodValue(b) - sortablePeriodValue(a));
    }

    function shortLabel(name) {
      return cleanText(name)
        .replace('뷰티/쇼핑', '뷰티/쇼핑')
        .replace('교통/차량', '교통/차량')
        .replace('문화/여가', '문화/여가');
    }

    function getCategoryColor(name, idx = 0) {
      const key = cleanText(name);
      return CATEGORY_COLORS[key] || CHART_COLORS[idx % CHART_COLORS.length];
    }
    function hexToRgb(hex) {
      const normalized = String(hex || '').replace('#', '').trim();
      if (normalized.length !== 6) return { r: 55, g: 60, b: 67 };
      return {
        r: parseInt(normalized.slice(0, 2), 16),
        g: parseInt(normalized.slice(2, 4), 16),
        b: parseInt(normalized.slice(4, 6), 16)
      };
    }

    function getSliceLabelColors(hex) {
      const { r, g, b } = hexToRgb(hex);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      if (brightness < 118) {
        return {
          fill: '#F5F6F7',
          stroke: 'rgba(24, 27, 32, 0.26)'
        };
      }
      return {
        fill: '#373C43',
        stroke: 'rgba(255, 255, 255, 0.22)'
      };
    }

    function getSliceLabelTone(hex) {
      const { r, g, b } = hexToRgb(hex);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness < 118 ? 'light' : 'dark';
    }


    function polarToCartesian(cx, cy, r, angleDeg) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle)
      };
    }

    function arcPath(cx, cy, rOuter, rInner, startAngle, endAngle) {
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      const outerStart = polarToCartesian(cx, cy, rOuter, startAngle);
      const outerEnd = polarToCartesian(cx, cy, rOuter, endAngle);
      const innerEnd = polarToCartesian(cx, cy, rInner, endAngle);
      const innerStart = polarToCartesian(cx, cy, rInner, startAngle);

      return [
        `M ${outerStart.x} ${outerStart.y}`,
        `A ${rOuter} ${rOuter} 0 ${largeArc} 1 ${outerEnd.x} ${outerEnd.y}`,
        `L ${innerEnd.x} ${innerEnd.y}`,
        `A ${rInner} ${rInner} 0 ${largeArc} 0 ${innerStart.x} ${innerStart.y}`,
        'Z'
      ].join(' ');
    }

    function labelPosition(cx, cy, rInner, rOuter, startAngle, endAngle) {
      const mid = startAngle + (endAngle - startAngle) / 2;
      const r = (rInner + rOuter) / 2;
      return polarToCartesian(cx, cy, r, mid);
    }

    function getInnerLabelPlacement(cx, x) {
      const delta = x - cx;
      if (delta > 18) {
        return { anchor: 'end', x: x + 8.5 };
      }
      if (delta < -18) {
        return { anchor: 'start', x: x - 8.5 };
      }
      return { anchor: 'middle', x };
    }

    function findMetricValue(metrics, label) {
      const found = (metrics || []).find((metric) => cleanText(metric.label) === label);
      return found ? Number(found.value || 0) : 0;
    }

    function renderMetrics(metrics) {
      return metrics.map((metric) => `
        <article class="metric">
          <div class="label">${escapeHtml(metric.label)}</div>
          <div class="value">${formatMoney(metric.value)}</div>
          <div class="note">${escapeHtml(metric.note || '한눈요약 기준')}</div>
        </article>
      `).join('');
    }

    function renderSpendChart(categories) {
      const sorted = [...categories].sort((a, b) => Number(b.amount || 0) - Number(a.amount || 0));
      const total = sorted.reduce((sum, item) => sum + Number(item.amount || 0), 0);
      if (!total) {
        return '<div class="donut-section"><p class="donut-caption">표시할 지출이 없어요.</p></div>';
      }

      const svgSize = 236;
      const cx = svgSize / 2;
      const cy = svgSize / 2;
      const rOuter = 74;
      const rInner = 50;
      const labelOuter = 84;
      let angle = 0;
      const slices = [];
      const labelCandidates = [];

      sorted.forEach((cat, idx) => {
        const amount = Number(cat.amount || 0);
        if (amount <= 0) return;

        const ratio = amount / total;
        const sweep = ratio * 360;
        const start = angle;
        const end = angle + sweep;
        const color = getCategoryColor(cat.name, idx);

        slices.push(`<path class="donut-slice" d="${arcPath(cx, cy, rOuter, rInner, start, end)}" fill="${color}" stroke="rgba(255,255,255,0.94)" stroke-width="1.35"></path>`);

        if (ratio >= 0.095) {
          const mid = start + sweep / 2;
          const label = shortLabel(cat.name);
          const percent = `${(ratio * 100).toFixed(1)}%`;
          const side = Math.cos((mid - 90) * Math.PI / 180) >= 0 ? 'right' : 'left';
          const anchorPoint = polarToCartesian(cx, cy, rOuter + 1.5, mid);
          const labelPoint = polarToCartesian(cx, cy, labelOuter, mid);
          const chipW = Math.min(76, Math.max(54, Math.max(label.length * 5.25 + 18, percent.length * 5.1 + 18)));
          const chipH = 26;
          const chipX = side === 'right' ? labelPoint.x + 2 : labelPoint.x - chipW - 2;
          const desiredY = labelPoint.y - chipH / 2;

          labelCandidates.push({
            side,
            color,
            label,
            percent,
            chipW,
            chipH,
            chipX,
            desiredY,
            anchorPoint,
            labelPoint
          });
        }

        angle = end;
      });

      const layoutLabels = (items, side) => {
        const sortedItems = [...items].sort((a, b) => a.desiredY - b.desiredY);
        const minY = 14;
        const maxY = svgSize - 37;
        const gap = 6;
        let cursor = minY;

        sortedItems.forEach((item) => {
          item.chipY = Math.max(cursor, Math.min(maxY, item.desiredY));
          cursor = item.chipY + item.chipH + gap;
        });

        cursor = maxY;
        for (let i = sortedItems.length - 1; i >= 0; i -= 1) {
          const item = sortedItems[i];
          item.chipY = Math.min(item.chipY, cursor);
          cursor = item.chipY - item.chipH - gap;
        }

        return sortedItems.map((item) => {
          const chipX = Math.max(6, Math.min(svgSize - item.chipW - 6, item.chipX));
          const chipY = Math.max(minY, Math.min(maxY, item.chipY));
          const edgeX = side === 'right' ? chipX : chipX + item.chipW;
          const edgeY = chipY + item.chipH / 2;
          const lineEndX = edgeX;
          const dotX = chipX + 8.8;
          const textX = dotX + 5.2;
          const percentX = textX;

          return `
            <path class="donut-label-line" d="M ${item.anchorPoint.x.toFixed(1)} ${item.anchorPoint.y.toFixed(1)} L ${lineEndX.toFixed(1)} ${edgeY.toFixed(1)}" stroke="${item.color}"></path>
            <g class="donut-label-chip">
              <rect x="${chipX.toFixed(1)}" y="${chipY.toFixed(1)}" width="${item.chipW.toFixed(1)}" height="${item.chipH}" rx="9"></rect>
              <circle class="donut-label-dot" cx="${dotX.toFixed(1)}" cy="${(chipY + 8.8).toFixed(1)}" r="2.65" fill="${item.color}"></circle>
              <text class="donut-label-text" text-anchor="start" x="${textX.toFixed(1)}" y="${(chipY + 8.7).toFixed(1)}">${escapeHtml(item.label)}</text>
              <text class="donut-label-percent" text-anchor="start" x="${percentX.toFixed(1)}" y="${(chipY + 18.3).toFixed(1)}">${item.percent}</text>
            </g>
          `;
        }).join('');
      };

      const leftLabels = layoutLabels(labelCandidates.filter((item) => item.side === 'left'), 'left');
      const rightLabels = layoutLabels(labelCandidates.filter((item) => item.side === 'right'), 'right');
      const labelGroups = [...leftLabels, ...rightLabels].join('');

      const detailCards = sorted.map((cat, idx) => {
        const color = getCategoryColor(cat.name, idx);
        const labelTone = getSliceLabelTone(color);
        return `
          <article class="category-side-card">
            <div class="category-side-top">
              <div class="category-side-name">
                <span class="category-side-dot" style="background:${color}"></span>
                <span>${escapeHtml(cat.name)}</span>
              </div>
              <div class="category-side-amount">${formatMoney(cat.amount)}</div>
            </div>
            <div class="category-side-progress">
              <div class="category-side-progress-top">
                <span class="category-side-progress-label">비중</span>
                <span class="category-side-progress-value">${formatPercent(cat.ratio)}</span>
              </div>
              <div class="category-side-bar" aria-label="${escapeHtml(cat.name)} 비중 ${formatPercent(cat.ratio)}">
                <div class="category-side-bar-fill" style="width:${Math.max(3, Number(cat.ratio || 0) * 100)}%; background:${color}"></div>
              </div>
            </div>
            <div class="category-side-includes">${escapeHtml(cat.includes || '')}</div>
          </article>
        `;
      }).join('');

      return `
        <div class="donut-section">
          <div class="donut-layout">
            <div class="donut-visual">
              <svg viewBox="0 0 ${svgSize} ${svgSize}" role="img" aria-label="분류별 지출 원형 그래프">
                <circle cx="${cx}" cy="${cy}" r="${rOuter}" fill="none" stroke="#ECEBE7" stroke-width="${rOuter - rInner}"></circle>
                ${slices.join('')}
                ${labelGroups}
              </svg>
              <div class="donut-center">
                <div>
                  <strong>총지출</strong>
                  <span>${formatMoney(total)}</span>
                </div>
              </div>
            </div>
            <div class="category-side-grid">
              ${detailCards}
            </div>
          </div>
          
        </div>
      `;
    }

    function renderCategoryCards(categories) {
      return `
        <div class="legend-list">
          ${categories.map((cat, idx) => {
            const color = getCategoryColor(cat.name, idx);
        const labelTone = getSliceLabelTone(color);
            return `
              <article class="legend-item">
                <div class="legend-top">
                  <div class="legend-name-row">
                    <span class="legend-dot" style="background:${color}"></span>
                    <span class="legend-name">${escapeHtml(cat.name)}</span>
                  </div>
                  <span class="legend-amount">${formatMoney(cat.amount)}</span>
                </div>
                <div class="category-meta">
                  <span class="chip">${formatPercent(cat.ratio)}</span>
                  <span>${escapeHtml(cat.includes || '')}</span>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderTopTable(top) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>순위</th>
                <th>항목</th>
                <th>분류</th>
                <th class="num">건수</th>

            <tbody>
              ${top.slice(0, 10).map((row, idx) => `
                <tr>
                  <td class="rank">${idx + 1}</td>

                    <span>${escapeHtml(row.item)}</span>
                    <span class="top-mobile-meta">${escapeHtml(row.category)} · ${Number(row.count || 0).toLocaleString('ko-KR')}건</span>
                  </td>
                  <td class="top-category">${escapeHtml(row.category)}</td>
                  <td class="num top-count">${Number(row.count || 0).toLocaleString('ko-KR')}</td>
                  <td class="num top-amount">${formatMoney(row.amount)}</td>
                </tr>

            </tbody>

    }

    function renderDashboardContent(data, options = {}) {
      if (!data) return '';
      const key = monthKey(data);
      const title = formatSummaryTitle(data.title) || periodLabelFromId(key) || '가계부';
      const showDelete = options.showDelete !== false;
      const openAttr = options.open === true ? ' open' : '';
      const monthExpense = findMetricValue(data.metrics, '총지출');

      return `
        <details class="month-card" data-key="${escapeHtml(key)}"${openAttr}>
          <summary>
            <div class="month-title-wrap">

              ${showDelete ? `
                <button class="delete-chip" type="button" data-delete-key="${escapeHtml(key)}" aria-label="이 달 가계부 삭제">
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path d="M7 7l10 10M17 7L7 17"></path>

            </div>

          <div class="month-body">

            </div>

            <div class="section-grid">

                  <div>
                    <h3>분류별 지출</h3>
                    <p class="hint"></p>

                </div>
                ${renderSpendChart(data.categories || [])}
              </section>

              <section class="panel">
                <div class="panel-head">
                  <div>
                    <h3>많이 쓴 항목 TOP 10</h3>
                    <p class="hint"></p>
                  </div>
                </div>
                ${renderTopTable(data.top || [])}

            </div>
          </div>
        </details>

    }


    function renderSideMenu(items) {
      const sorted = sortSummaries(items);
      const groups = new Map();
      sorted.forEach((item) => {
        const key = monthKey(item);
        const match = key.match(/^(\d{4})-(\d{2})$/);
        const year = match ? match[1] : '기타';
        if (!groups.has(year)) groups.set(year, []);
        groups.get(year).push(item);
      });

      const selectedYear = selectedMonthKey ? selectedMonthKey.slice(0, 4) : '';
      const groupEntries = Array.from(groups.entries());
      const caret = `
        <span class="nav-caret" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false"><path d="M8 10l4 4 4-4"></path></svg>

      `;

      const ledgerTree = sorted.length ? `
        <details class="nav-section ledger-section" ${sorted.length ? 'open' : ''}>
          <summary class="nav-summary ${activeView === 'ledger' ? 'active' : ''}">
            <span>가계부</span>
            ${caret}
          </summary>
          <div class="nav-tree">
            ${groupEntries.map(([year, months], index) => {
              const shouldOpen = index === 0 || year === selectedYear;
              return `
                <details class="year-group" ${shouldOpen ? 'open' : ''}>
                  <summary class="year-summary">
                    <span>${escapeHtml(year)}년도</span>
                    ${caret}
                  </summary>
                  <div class="year-months">
                    ${months.map((item) => {
                      const key = monthKey(item);
                      const label = periodLabelFromId(key) || formatSummaryTitle(item.title) || key;
                      const active = activeView === 'ledger' && selectedMonthKey === key ? ' active' : '';
                      return `<button class="month-link${active}" type="button" data-view="ledger" data-month="${escapeHtml(key)}">${escapeHtml(label)}</button>`;
                    }).join('')}
                  </div>
                </details>
              `;
            }).join('')}
          </div>
        </details>
      ` : `
        <details class="nav-section ledger-section" open>
          <summary class="nav-summary ${activeView === 'ledger' ? 'active' : ''}">
            <span>가계부</span>
            ${caret}
          </summary>
        </details>
      `;

      sideNav.innerHTML = `
        <button class="${activeView === 'home' ? 'active' : ''}" type="button" data-view="home">홈</button>
        ${ledgerTree}
        <button class="${activeView === 'analysis' ? 'active' : ''}" type="button" data-view="analysis">지출분석</button>
      `;
    }

    function setActiveView(view, month = '') {
      activeView = view || 'home';
      if (month) selectedMonthKey = month;
      if (activeView === 'ledger' && !selectedMonthKey) {
        const latest = sortSummaries(currentItems)[0];
        selectedMonthKey = latest ? monthKey(latest) : '';
      }
      renderAllSummaries(currentItems);

      if (isMobileView()) {
        closeMenu();
      }

      if (activeView === 'ledger' && month) {
        window.setTimeout(() => {
          const target = Array.from(ledgerContent.querySelectorAll('.month-card')).find((card) => card.dataset.key === month);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 80);

      }
    }

    function showOnlyActiveView() {
      homeView.hidden = activeView !== 'home';
      ledgerView.hidden = activeView !== 'ledger';
      analysisView.hidden = activeView !== 'analysis';
      updateMobileMode();
    }

    function categoryMap(data) {
      const map = new Map();
      (data?.categories || []).forEach((cat) => {
        map.set(cleanText(cat.name), Number(cat.amount || 0));
      });
      return map;
    }

    function signedMoney(value) {
      const n = Number(value || 0);
      if (n > 0) return `+${n.toLocaleString('ko-KR')}원`;
      if (n < 0) return `-${Math.abs(n).toLocaleString('ko-KR')}원`;
      return '0원';
    }

    function renderMonthlyBars(items) {
      const chronological = [...sortSummaries(items)].reverse();
      const max = Math.max(...chronological.map((item) => findMetricValue(item.metrics, '총지출')), 1);
      return `
        <section class="analysis-panel">
          <h3>월별 지출 비교</h3>
          <div class="monthly-bars">
            ${chronological.map((item) => {
              const key = monthKey(item);
              const label = periodLabelFromId(key) || formatSummaryTitle(item.title);
              const value = findMetricValue(item.metrics, '총지출');
              const width = Math.max(3, Math.round((value / max) * 100));
              return `
                <div class="bar-row">
                  <div>${escapeHtml(label)}</div>
                  <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
                  <div class="bar-amount">${formatMoney(value)}</div>
                </div>
              `;
            }).join('')}
          </div>
        </section>
      `;
    }

    function getAnalysisPair(items) {
      const sorted = sortSummaries(items);
      if (!analysisTargetKey || !sorted.some((item) => monthKey(item) === analysisTargetKey)) {
        analysisTargetKey = sorted[0] ? monthKey(sorted[0]) : '';
      }
      if (!analysisCompareKey || !sorted.some((item) => monthKey(item) === analysisCompareKey) || analysisCompareKey === analysisTargetKey) {
        const targetIndex = sorted.findIndex((item) => monthKey(item) === analysisTargetKey);
        const fallback = sorted[targetIndex + 1] || sorted.find((item) => monthKey(item) !== analysisTargetKey);
        analysisCompareKey = fallback ? monthKey(fallback) : '';
      }
      return {
        current: sorted.find((item) => monthKey(item) === analysisTargetKey),
        previous: sorted.find((item) => monthKey(item) === analysisCompareKey),
        sorted
      };
    }

    function renderAnalysis(items) {
      const sorted = sortSummaries(items);
      if (sorted.length < 2) {
        return '<div class="analysis-empty">두 달 이상 쌓이면 지출분석이 표시돼요.</div>';
      }

      const { current, previous } = getAnalysisPair(sorted);
      if (!current || !previous) return '<div class="analysis-empty">분석할 월을 선택해 주세요.</div>';

      const currentSpend = findMetricValue(current.metrics, '총지출');
      const previousSpend = findMetricValue(previous.metrics, '총지출');
      const totalDelta = currentSpend - previousSpend;

      const currentMap = categoryMap(current);
      const previousMap = categoryMap(previous);
      const names = Array.from(new Set([...currentMap.keys(), ...previousMap.keys()])).filter(Boolean);
      const changes = names.map((name) => {
        const before = previousMap.get(name) || 0;
        const after = currentMap.get(name) || 0;
        return { name, before, after, delta: after - before };
      }).sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));

      const increased = changes.filter((item) => item.delta > 0).sort((a, b) => b.delta - a.delta)[0];
      const decreased = changes.filter((item) => item.delta < 0).sort((a, b) => a.delta - b.delta)[0];
      const options = sorted.map((item) => {
        const key = monthKey(item);
        const label = periodLabelFromId(key) || formatSummaryTitle(item.title) || key;
        return `<option value="${escapeHtml(key)}">${escapeHtml(label)}</option>`;
      }).join('');

      return `
        <div class="analysis-toolbar">
          <div class="analysis-field">
            <label for="analysisTarget">월 선택</label>
            <select class="analysis-select" id="analysisTarget">${options}</select>
          </div>
          <div class="analysis-field">
            <label for="analysisCompare">비교 월</label>
            <select class="analysis-select" id="analysisCompare">${options}</select>
          </div>
        </div>

        ${renderMonthlyBars(sorted)}

        <section class="analysis-panel">
          <h3>지난달 대비</h3>
          <div class="analysis-card-grid">
            <article class="analysis-card">
              <div class="label">총지출 변화</div>
              <div class="value">${signedMoney(totalDelta)}</div>
            </article>
            <article class="analysis-card">
              <div class="label">가장 많이 증가</div>
              <div class="value">${escapeHtml(increased?.name || '-')}</div>
              <div class="sub">${increased ? signedMoney(increased.delta) : '-'}</div>
            </article>
            <article class="analysis-card">
              <div class="label">가장 많이 감소</div>
              <div class="value">${escapeHtml(decreased?.name || '-')}</div>
              <div class="sub">${decreased ? signedMoney(decreased.delta) : '-'}</div>
            </article>
          </div>
        </section>

        <section class="analysis-panel">
          <h3>분류별 변화</h3>
          <div class="change-list">
            ${changes.map((item) => `
              <div class="change-item">
                <div class="change-name">${escapeHtml(item.name)}</div>
                <div class="change-before">${formatMoney(item.before)} → ${formatMoney(item.after)}</div>
                <div class="change-delta">${signedMoney(item.delta)}</div>
              </div>
            `).join('') || '<div class="analysis-empty">표시할 변화가 없어요.</div>'}
          </div>
        </section>

        <section class="analysis-panel">
          <h3>많이 쓴 항목 TOP 5</h3>
          <div class="top-five-list">
            ${(current.top || []).slice(0, 5).map((row, idx) => `
              <div class="top-five-item">
                <div class="top-five-rank">${idx + 1}</div>
                <div class="top-five-name">
                  <strong>${escapeHtml(row.item)}</strong>
                  <span>${escapeHtml(row.category)} · ${Number(row.count || 0).toLocaleString('ko-KR')}건</span>
                </div>
                <div class="top-five-amount">${formatMoney(row.amount)}</div>
              </div>
            `).join('') || '<div class="analysis-empty">표시할 항목이 없어요.</div>'}
          </div>
        </section>
      `;
    }

    function syncAnalysisSelects() {
      const target = document.getElementById('analysisTarget');
      const compare = document.getElementById('analysisCompare');
      if (target) target.value = analysisTargetKey;
      if (compare) compare.value = analysisCompareKey;
    }

    function renderAllSummaries(items) {
      const sorted = sortSummaries(items);
      const latest = sorted[0];
      if (latest && !selectedMonthKey) selectedMonthKey = monthKey(latest);

      renderSideMenu(sorted);
      showOnlyActiveView();

      const hasItems = sorted.length > 0;
      emptyState.style.display = hasItems ? 'none' : 'block';
      dashboard.classList.toggle('show', true);

      if (homeHead) homeHead.hidden = !hasItems;
      homeContent.innerHTML = latest ? renderDashboardContent(latest, { open: true }) : '';

      const selected = sorted.find((item) => monthKey(item) === selectedMonthKey) || latest;
      if (selected) selectedMonthKey = monthKey(selected);
      ledgerContent.innerHTML = hasItems ? `
        <div class="month-list">
          ${sorted.map((item, idx) => {
            const key = monthKey(item);
            const shouldOpen = selectedMonthKey ? key === selectedMonthKey : idx === 0;
            return renderDashboardContent(item, { open: shouldOpen });
          }).join('')}
        </div>
      ` : '';

      analysisContent.innerHTML = renderAnalysis(sorted);
      syncAnalysisSelects();
    }

    async function deleteMonthByKey(key, button) {
      const target = currentItems.find((item) => monthKey(item) === key);
      const label = target ? (formatSummaryTitle(target.title) || periodLabelFromId(key) || '이 달 가계부') : '이 달 가계부';
      if (!confirm(`${label}를 삭제할까요?\n삭제하면 PC와 모바일에서 모두 사라져요.`)) return;
      if (button) button.disabled = true;
      try {
        await deleteDoc(doc(db, COLLECTION_NAME, key));
        currentItems = currentItems.filter((item) => monthKey(item) !== key);
        if (selectedMonthKey === key) selectedMonthKey = '';
        if (analysisTargetKey === key) analysisTargetKey = '';
        if (analysisCompareKey === key) analysisCompareKey = '';
        saveStore(currentItems);
        renderAllSummaries(currentItems);
        setSyncStatus('');
      } catch (error) {
        console.error(error);
        if (button) button.disabled = false;
        showError('삭제 중 문제가 생겼어요. 잠시 후 다시 시도해줘요.');
      }
    }

    function openMenu() {
      sideMenu.classList.add('open');
      sideMenu.setAttribute('aria-hidden', 'false');
      menuBackdrop.hidden = false;
      menuButton.setAttribute('aria-expanded', 'true');
    }

    function closeMenu() {
      sideMenu.classList.remove('open');
      sideMenu.setAttribute('aria-hidden', 'true');
      menuBackdrop.hidden = true;
      menuButton.setAttribute('aria-expanded', 'false');
    }

    async function handleFile(file) {
      hideError();
      if (!file) return;
      if (isMobileView()) {
        showError('모바일에서는 확인만 가능해요. 새 엑셀 업로드는 PC에서 진행해 주세요.');
        return;
      }
      if (!currentUser) {
        showError('로그인 후 업로드할 수 있어요.');
        return;
      }
      if (!/\.(xlsx|xls)$/i.test(file.name)) {
        showError('엑셀 파일(.xlsx 또는 .xls)만 업로드할 수 있어요.');
        return;
      }

      pickButton.disabled = true;
      setSyncStatus('');
      try {
        const buffer = await file.arrayBuffer();
        const parsed = parseWorkbook(buffer);
        const id = monthKey(parsed);
        const title = formatSummaryTitle(parsed.title) || periodLabelFromId(id) || '가계부';
        const exists = currentItems.some((item) => monthKey(item) === id) || (await getDoc(doc(db, COLLECTION_NAME, id))).exists();
        if (exists && !confirm(`${title} 데이터가 이미 있어요.
이 파일로 해당 월만 교체할까요?`)) {
          setSyncStatus('');
          return;
        }

        const data = toPlainData({
          ...parsed,
          periodId: id,
          sourceFile: file.name,
          updatedAt: new Date().toISOString()
        });
        await setDoc(doc(db, COLLECTION_NAME, id), data);
        await loadSavedSummaries();
        setSyncStatus('');
      } catch (error) {
        console.error(error);
        showError(error.message || '파일을 읽는 중 문제가 생겼어요.');
        setSyncStatus('');
      } finally {
        pickButton.disabled = false;
      }
    }

    authForm.addEventListener('submit', (event) => {
      event.preventDefault();
      checkPassword();
    });

    pickButton.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopPropagation();
      fileInput.click();
    });

    fileInput.addEventListener('change', (event) => {
      handleFile(event.target.files?.[0]);
      fileInput.value = '';
    });

    ['dragenter', 'dragover'].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove('dragover');
      });
    });

    dropzone.addEventListener('drop', (event) => {
      handleFile(event.dataTransfer.files?.[0]);
    });

    menuButton.addEventListener('click', () => {
      if (sideMenu.classList.contains('open')) closeMenu();
      else openMenu();
    });

    if (sideLogoButton) {
      sideLogoButton.addEventListener('click', closeMenu);
    }

    menuBackdrop.addEventListener('click', closeMenu);

    sideNav.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-view]');
      if (!button) return;
      const view = button.getAttribute('data-view');
      const month = button.getAttribute('data-month') || '';
      setActiveView(view, month);
    });

    appShell.addEventListener('click', (event) => {
      const deleteButton = event.target.closest('[data-delete-key]');
      if (deleteButton) {
        event.preventDefault();
        event.stopPropagation();
        deleteMonthByKey(deleteButton.getAttribute('data-delete-key'), deleteButton);
        return;
      }

      const targetSelect = event.target.closest('#analysisTarget');
      const compareSelect = event.target.closest('#analysisCompare');
      if (targetSelect || compareSelect) return;
    });

    appShell.addEventListener('change', (event) => {
      if (event.target.id === 'analysisTarget') {
        analysisTargetKey = event.target.value;
        if (analysisCompareKey === analysisTargetKey) analysisCompareKey = '';
        renderAllSummaries(currentItems);
      }
      if (event.target.id === 'analysisCompare') {
        analysisCompareKey = event.target.value;
        if (analysisCompareKey === analysisTargetKey) analysisTargetKey = '';
        renderAllSummaries(currentItems);
      }
    });

    document.addEventListener('touchstart', (event) => {
      if (authScreen && !authScreen.hidden) return;
      const touch = event.touches && event.touches[0];
      if (!touch) return;
      menuTouchStartX = touch.clientX;
      menuTouchStartY = touch.clientY;
    }, { passive: true });

    document.addEventListener('touchend', (event) => {
      if (authScreen && !authScreen.hidden) return;
      const touch = event.changedTouches && event.changedTouches[0];
      if (!touch) return;
      const dx = touch.clientX - menuTouchStartX;
      const dy = Math.abs(touch.clientY - menuTouchStartY);
      if (dy > 70 || Math.abs(dx) < 70) return;
      if (dx > 0 && menuTouchStartX < 42) openMenu();
      if (dx < 0 && sideMenu.classList.contains('open')) closeMenu();
    }, { passive: true });

    logoutButton.addEventListener('click', async () => {
      logoutButton.disabled = true;
      try {
        await signOut(auth);
      } finally {
        logoutButton.disabled = false;
      }
    });

    window.addEventListener('resize', updateMobileMode);

    window.addEventListener('DOMContentLoaded', () => {
      updateMobileMode();
      const savedEmail = localStorage.getItem(LAST_EMAIL_KEY) || '';
      if (savedEmail) emailInput.value = savedEmail;

      setPersistence(auth, browserLocalPersistence).catch((error) => {
        console.warn('Firebase persistence 설정 실패', error);
      });

      onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
          if (!emailInput.value && user.email) emailInput.value = user.email;
          showApp();
        } else {
          currentItems = [];
          renderAllSummaries([]);
          showLogin();
        }
      });
    });
  </script>
</body>
</html>
